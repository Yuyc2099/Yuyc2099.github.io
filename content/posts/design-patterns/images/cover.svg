<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">软件设计模式抽象结构</title>
  <desc id="desc">接口、组合关系和行为节点构成的抽象软件结构图</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f4ea"/>
      <stop offset="1" stop-color="#e9eef0"/>
    </linearGradient>
    <linearGradient id="module" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26353d"/>
      <stop offset="1" stop-color="#10191e"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#25343b" flood-opacity=".16"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#819097" stroke-opacity=".12"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#background)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <g fill="none" stroke="#b56d32" stroke-width="5" stroke-linecap="round">
    <path d="M250 205H440L520 305"/>
    <path d="M250 400H440L520 400"/>
    <path d="M250 595H440L520 495"/>
    <path d="M680 305L760 205H950"/>
    <path d="M680 400H950"/>
    <path d="M680 495L760 595H950"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="270" width="260" height="260" rx="34" fill="url(#module)"/>
    <rect x="508" y="308" width="184" height="184" rx="22" fill="#324852" stroke="#d49350" stroke-width="4"/>
    <circle cx="550" cy="350" r="12" fill="#e1a35f"/>
    <circle cx="650" cy="350" r="12" fill="#7da28d"/>
    <circle cx="550" cy="450" r="12" fill="#7895aa"/>
    <circle cx="650" cy="450" r="12" fill="#d8c7a9"/>
    <path d="M550 350H650M550 450H650M550 350V450M650 350V450M550 350L650 450M650 350L550 450" stroke="#d8ddd9" stroke-width="4" opacity=".8"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="190" cy="205" r="66" fill="#617e70"/>
    <rect x="124" y="334" width="132" height="132" rx="25" fill="#57758a"/>
    <path d="M190 525l74 128H116z" fill="#c07b3c"/>

    <path d="M1010 139l72 42v84l-72 42-72-42v-84z" fill="#c69557"/>
    <circle cx="1010" cy="400" r="66" fill="#445b65"/>
    <rect x="944" y="529" width="132" height="132" rx="66" fill="#7f8c70"/>
  </g>

  <g fill="#f7f5ee" opacity=".9">
    <circle cx="190" cy="205" r="15"/>
    <circle cx="190" cy="400" r="15"/>
    <circle cx="190" cy="592" r="15"/>
    <circle cx="1010" cy="223" r="15"/>
    <circle cx="1010" cy="400" r="15"/>
    <circle cx="1010" cy="595" r="15"/>
  </g>
</svg>
