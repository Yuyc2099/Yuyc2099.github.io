<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">嵌入式软件缺陷深入分析</title>
  <desc id="desc">内存、线程栈与 RTOS 同步关系示意图</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071724"/>
      <stop offset="1" stop-color="#16364a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173f55"/>
      <stop offset="1" stop-color="#0b2638"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#02080e" flood-opacity=".5"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#background)"/>
  <g opacity=".13" stroke="#6dc6d8" stroke-width="2" fill="none">
    <path d="M0 140h270l70 70h190M0 760h310l70-70h150M1600 155h-260l-80 80h-180M1600 735h-290l-65-65h-165"/>
  </g>
  <g transform="translate(120 170)" filter="url(#shadow)">
    <rect width="620" height="560" rx="30" fill="url(#panel)" stroke="#367d94" stroke-width="3"/>
    <text x="42" y="60" fill="#8fd8e4" font-family="Consolas, monospace" font-size="25">RTOS STATE</text>
    <g transform="translate(42 98)">
      <rect width="250" height="72" rx="12" fill="#176b78"/>
      <text x="125" y="45" fill="#fff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="25" text-anchor="middle">线程 A · RUN</text>
      <rect x="286" width="250" height="72" rx="12" fill="#84543c"/>
      <text x="411" y="45" fill="#fff" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="25" text-anchor="middle">线程 B · WAIT</text>
    </g>
    <g transform="translate(42 215)" font-family="Consolas, monospace" font-size="22">
      <rect width="536" height="180" rx="16" fill="#071923" stroke="#295b6d" stroke-width="2"/>
      <text x="25" y="42" fill="#85cbd7">HEAP</text>
      <rect x="25" y="65" width="70" height="76" fill="#dd6b5f"/>
      <rect x="101" y="65" width="220" height="76" fill="#2f8192"/>
      <rect x="327" y="65" width="70" height="76" fill="#dd6b5f"/>
      <rect x="403" y="65" width="108" height="76" fill="#234a5c"/>
      <text x="60" y="112" fill="#fff" text-anchor="middle">GUARD</text>
      <text x="211" y="112" fill="#fff" text-anchor="middle">USER DATA</text>
      <text x="362" y="112" fill="#fff" text-anchor="middle">GUARD</text>
      <text x="457" y="112" fill="#8cb2bf" text-anchor="middle">META</text>
    </g>
    <g transform="translate(42 438)">
      <text x="0" y="26" fill="#85cbd7" font-family="Consolas, monospace" font-size="22">STACK</text>
      <rect x="105" width="430" height="46" rx="8" fill="#235267"/>
      <rect x="105" width="66" height="46" rx="8" fill="#db655b"/>
      <path d="M495 61H190" stroke="#f1c96f" stroke-width="5" stroke-linecap="round"/>
      <path d="M190 61l18-12v24z" fill="#f1c96f"/>
      <text x="320" y="96" fill="#9abac5" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" text-anchor="middle">SP 向边界增长</text>
    </g>
  </g>
  <g transform="translate(820 220)">
    <text x="0" y="70" fill="#f2f7fa" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="63" font-weight="700">嵌入式软件缺陷</text>
    <text x="0" y="145" fill="#f2f7fa" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="63" font-weight="700">深入分析</text>
    <text x="3" y="205" fill="#87cad7" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28">内存 · 栈 · RTOS 同步</text>
    <g transform="translate(0 275)" font-family="Consolas, monospace" font-size="25">
      <text y="0" fill="#e06a60">heap corruption</text>
      <text y="50" fill="#e8c56d">stack overflow</text>
      <text y="100" fill="#80d0dc">deadlock &amp; inversion</text>
      <text y="150" fill="#a7bdc7">race &amp; reentrancy</text>
    </g>
  </g>
</svg>
