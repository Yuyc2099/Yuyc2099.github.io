<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cortex-M 异常分析</title>
  <desc id="desc">Cortex-M 内核、异常栈帧、寄存器和调用栈的抽象示意图</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081a2d"/>
      <stop offset="1" stop-color="#102f46"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a6680"/>
      <stop offset="1" stop-color="#123b58"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020912" flood-opacity=".5"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity=".14" stroke="#71d7e8" stroke-width="2">
    <path d="M0 160h310l65 65h190M0 720h270l75-75h220M1600 175h-280l-75 75h-190M1600 700h-300l-65-65h-180" fill="none"/>
    <circle cx="375" cy="225" r="7" fill="#71d7e8"/><circle cx="345" cy="645" r="7" fill="#71d7e8"/>
    <circle cx="1245" cy="250" r="7" fill="#71d7e8"/><circle cx="1235" cy="635" r="7" fill="#71d7e8"/>
  </g>
  <g transform="translate(190 208)" filter="url(#shadow)">
    <rect width="480" height="480" rx="42" fill="url(#chip)" stroke="#63c7dc" stroke-width="4"/>
    <rect x="62" y="62" width="356" height="356" rx="24" fill="#0b263c" stroke="#2f8199" stroke-width="3"/>
    <g fill="#63c7dc">
      <rect x="-32" y="52" width="32" height="18" rx="4"/><rect x="-32" y="134" width="32" height="18" rx="4"/><rect x="-32" y="216" width="32" height="18" rx="4"/><rect x="-32" y="298" width="32" height="18" rx="4"/><rect x="-32" y="380" width="32" height="18" rx="4"/>
      <rect x="480" y="52" width="32" height="18" rx="4"/><rect x="480" y="134" width="32" height="18" rx="4"/><rect x="480" y="216" width="32" height="18" rx="4"/><rect x="480" y="298" width="32" height="18" rx="4"/><rect x="480" y="380" width="32" height="18" rx="4"/>
    </g>
    <path d="M158 126h164l45 78-45 78H158l-45-78z" fill="#e45f56" opacity=".92"/>
    <text x="240" y="193" fill="#fff" font-family="Arial, sans-serif" font-size="32" font-weight="700" text-anchor="middle">FAULT</text>
    <text x="240" y="238" fill="#ffe8e5" font-family="Arial, sans-serif" font-size="25" text-anchor="middle">PC · LR · xPSR</text>
    <text x="240" y="345" fill="#8ee6ef" font-family="Arial, sans-serif" font-size="36" font-weight="700" text-anchor="middle">Cortex-M</text>
  </g>
  <g transform="translate(790 190)">
    <text x="0" y="60" fill="#f2f7fb" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="64" font-weight="700">Cortex-M 异常分析</text>
    <text x="2" y="112" fill="#86cbd8" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="27">从异常栈帧到 HardFault 定位</text>
    <g transform="translate(0 175)" font-family="Consolas, monospace" font-size="25">
      <rect width="540" height="330" rx="22" fill="#071726" stroke="#2d7188" stroke-width="3"/>
      <text x="34" y="57" fill="#7fd9e7">EXC_RETURN</text><text x="300" y="57" fill="#f2c96d">MSP / PSP</text>
      <path d="M35 82h470" stroke="#25566b" stroke-width="2"/>
      <g fill="#d7e6ee">
        <text x="34" y="126">R0   R1   R2   R3</text>
        <text x="34" y="173">R12  LR   PC   xPSR</text>
      </g>
      <path d="M38 216h315" stroke="#e45f56" stroke-width="5" stroke-linecap="round"/>
      <path d="M353 216l-18-12v24z" fill="#e45f56"/>
      <text x="34" y="265" fill="#95b7c5">CFSR  HFSR  BFAR  MMFAR</text>
      <text x="34" y="306" fill="#6fa6b7">call stack → root cause</text>
    </g>
  </g>
</svg>
